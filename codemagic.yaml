workflows:
  ios-workflow:
    name: SnapShe iOS Build

    integrations:
      app_store_connect: codemagic

    environment:
      xcode: latest
      cocoapods: default

      vars:
        BUNDLE_ID: "com.snapshe.app"
        XCODE_PROJECT: "SnapShe.xcodeproj"
        XCODE_SCHEME: "SnapShe"
        APP_STORE_APPLE_ID: "6760227147"
        DEVELOPMENT_TEAM: "M3RM3YA99H"
        APP_VERSION: "1.0.7"

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.snapshe.app

    triggering:
      events:
        - push

    scripts:

      - name: Install CocoaPods
        script: |
          cd $CM_BUILD_DIR

          if [ -f "Podfile" ]; then
            pod install
          fi

      - name: Set app version
        script: |
          cd $CM_BUILD_DIR

          BUILD_NUMBER="${CM_BUILD_NUMBER}"

          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="31"
          fi

          echo "Setting CFBundleShortVersionString=$APP_VERSION"
          echo "Setting CFBundleVersion=$BUILD_NUMBER"

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $APP_VERSION" SnapShe/Info.plist || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $APP_VERSION" SnapShe/Info.plist

          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" SnapShe/Info.plist || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BUILD_NUMBER" SnapShe/Info.plist

          echo "Final Info.plist values:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" SnapShe/Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" SnapShe/Info.plist

      - name: Install signing certificates
        script: |
          keychain initialize

          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

          keychain add-certificates

          xcode-project use-profiles

      - name: Create export options
        script: |
          cat > /Users/builder/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>

            <key>method</key>
            <string>app-store</string>

            <key>signingStyle</key>
            <string>automatic</string>

            <key>teamID</key>
            <string>M3RM3YA99H</string>

            <key>uploadBitcode</key>
            <false/>

            <key>compileBitcode</key>
            <false/>

            <key>destination</key>
            <string>export</string>

          </dict>
          </plist>
          EOF

      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR

          xcodebuild clean archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$CM_BUILD_DIR/build/SnapShe.xcarchive" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Automatic

          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/SnapShe.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist "/Users/builder/export_options.plist"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/SnapShe.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
