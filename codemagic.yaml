workflows:
  ios-workflow:
    name: SnapShe iOS Build

    integrations:
      app_store_connect: codemagic

    environment:
      xcode: latest
      cocoapods: default

      vars:
        BUNDLE_ID: "com.snapshe.app"
        XCODE_PROJECT: "SnapShe.xcodeproj"
        XCODE_SCHEME: "SnapShe"
        APP_STORE_APPLE_ID: "6760227147"

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.snapshe.app

    triggering:
      events:
        - push

    scripts:
      - name: Set app version
        script: |
          cd $CM_BUILD_DIR
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.3" SnapShe/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 1" SnapShe/Info.plist || true

      - name: Use signing profiles
        script: |
          cd $CM_BUILD_DIR
          xcode-project use-profiles \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT"

      - name: Install CocoaPods
        script: |
          cd $CM_BUILD_DIR
          if [ -f "Podfile" ]; then
            pod install
          fi

      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
