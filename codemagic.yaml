workflows:
  ios-workflow:
    name: SnapShe iOS Build
    integrations:
      app_store_connect: codemagic
    environment:
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.snapshe.app"
        XCODE_PROJECT: "SnapShe.xcodeproj"
        XCODE_SCHEME: "SnapShe"
        APP_STORE_APPLE_ID: "6760227147"
        DEVELOPMENT_TEAM: "M3RM3YA99H"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.snapshe.app
    triggering:
      events:
        - push
    scripts:
      - name: Set app version
        script: |
          cd $CM_BUILD_DIR
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.4" SnapShe/Info.plist || /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string 1.0.4" SnapShe/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $CM_BUILD_NUMBER" SnapShe/Info.plist || /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $CM_BUILD_NUMBER" SnapShe/Info.plist
      - name: Install CocoaPods
        script: |
          cd $CM_BUILD_DIR
          if [ -f "Podfile" ]; then
            pod install
          fi
      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR

          python3 -c "
          import plistlib
          data = {
            'method': 'app-store-connect',
            'signingStyle': 'automatic',
            'teamID': 'M3RM3YA99H',
            'uploadBitcode': False,
            'uploadSymbols': True,
          }
          with open('/tmp/export_options.plist', 'wb') as f:
            plistlib.dump(data, f, fmt=plistlib.FMT_XML)
          print('export_options.plist created')
          "

          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build/SnapShe.xcarchive" \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM \
            | xcpretty

          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/SnapShe.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist /tmp/export_options.plist \
            -allowProvisioningUpdates \
            | xcpretty
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
