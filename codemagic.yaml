workflows:
  ios-workflow:
    name: SnapShe iOS Build

    integrations:
      app_store_connect: codemagic

    environment:
      xcode: latest
      cocoapods: default

      vars:
        BUNDLE_ID: "com.snapshe.app"
        XCODE_PROJECT: "SnapShe.xcodeproj"
        XCODE_SCHEME: "SnapShe"
        APP_STORE_APPLE_ID: "6760227147"
        DEVELOPMENT_TEAM: "M3RM3YA99H"

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.snapshe.app

    triggering:
      events:
        - push

    scripts:
      - name: Set app version
        script: |
          cd $CM_BUILD_DIR

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.4" SnapShe/Info.plist || /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string 1.0.4" SnapShe/Info.plist

          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $CM_BUILD_NUMBER" SnapShe/Info.plist || /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $CM_BUILD_NUMBER" SnapShe/Info.plist

          sed -i '' "s/MARKETING_VERSION = [^;]*;/MARKETING_VERSION = 1.0.4;/g" SnapShe.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = $CM_BUILD_NUMBER;/g" SnapShe.xcodeproj/project.pbxproj
          sed -i '' "s/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = M3RM3YA99H;/g" SnapShe.xcodeproj/project.pbxproj
          sed -i '' "s/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Automatic;/g" SnapShe.xcodeproj/project.pbxproj

      - name: Install CocoaPods
        script: |
          cd $CM_BUILD_DIR
          if [ -f "Podfile" ]; then
            pod install
          fi

      - name: Create export options
        script: |
          cat > /Users/builder/export_options.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>

            <key>signingStyle</key>
            <string>automatic</string>

            <key>teamID</key>
            <string>M3RM3YA99H</string>

            <key>uploadBitcode</key>
            <false/>

            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR

          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist /Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
