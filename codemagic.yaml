workflows:
  ios-workflow:
    name: SnapShe iOS Build

    environment:
      xcode: latest
      cocoapods: default

      vars:
        BUNDLE_ID: "com.snapshe.app"
        XCODE_PROJECT: "SnapShe.xcodeproj"
        XCODE_SCHEME: "SnapShe"
        APP_STORE_APPLE_ID: "6760227147"

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.snapshe.app

    triggering:
      events:
        - push

    scripts:
      - name: Set app version
        script: |
          cd $CM_BUILD_DIR
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.2" SnapShe/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 3" SnapShe/Info.plist || true

      - name: Install CocoaPods
        script: |
          cd $CM_BUILD_DIR
          if [ -f "Podfile" ]; then
            pod install
          fi

      - name: Create Export Options
        script: |
          cd $CM_BUILD_DIR
          python3 - <<'PY'
          import plistlib
          data = {
              "method": "app-store-connect",
              "signingStyle": "automatic",
              "stripSwiftSymbols": True,
              "compileBitcode": False,
              "uploadBitcode": False
          }
          with open("export_options.plist", "wb") as f:
              plistlib.dump(data, f)
          PY
          plutil -lint export_options.plist

      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist "$CM_BUILD_DIR/export_options.plist"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
